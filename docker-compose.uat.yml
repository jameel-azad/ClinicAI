# UAT stack — same as prod but without Caddy TLS.
# Exposes API on port 8000 and dashboard on port 3000 directly.
# Use behind an ngrok tunnel or a simple reverse proxy for UAT testing.
#
# Usage:
#   docker compose -f docker-compose.uat.yml up -d --build
#   docker compose -f docker-compose.uat.yml logs -f api
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinicai
      POSTGRES_USER: clinicai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://clinicai:${POSTGRES_PASSWORD}@postgres:5432/clinicai
      - REDIS_URL=redis://redis:6379
    volumes:
      - generated_data:/app/generated
      - ./google_credentials.json:/app/google_credentials.json:ro
      - ./google_token.json:/app/google_token.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL in .env}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  generated_data:
